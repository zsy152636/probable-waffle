spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ai_quiz?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0

      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  sql:
    init:
      mode: always
      schema-locations: classpath:db/migration/schema.sql
      data-locations: classpath:db/migration/data.sql
      continue-on-error: true

logging:
  level:
    com.example.quiz: debug
