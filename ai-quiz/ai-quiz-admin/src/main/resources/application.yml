server:
  port: 9010

spring:
  application:
    name: ai-quiz
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

mybatis-plus:
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: ai-quiz-jwt-secret-key-must-be-at-least-256-bits-long!!
  expiration: 7200

upload:
  path: E:/ai_quiz
